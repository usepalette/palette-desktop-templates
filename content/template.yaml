name: Content
slug: content
type: workflow
version: 1.0.0
author: Palette
description: A content system for writers and marketers — start drafts for a target channel, refine them against your own playbook, check copy against your brand voice, plan distribution, and keep a log of what you've shipped. Driven by a /content skill.
logo: logo.png
tags: [content, writing, marketing, blog, social, voice, productivity]
license: MIT

notes: |
  After install, run /content new "<topic>" to start a draft, /content refine
  <slug> to tighten it, and /content voice-check <slug> to check it against
  your brand voice. Your tone, principles, and voice self-check are
  personalized into voice.md at install.
